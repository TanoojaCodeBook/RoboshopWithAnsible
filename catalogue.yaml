- name: configuring catalogue
  hosts: catalogue
  become: yes
  tasks:
   - name: enable node js 20
     ansible.builtin.command: dnf module enable nodejs:20 -y

   - name: installing node js 20 
     ansible.builtin.dnf:
       name: nodejs
       state: present
    
   - name: creating system user roboshop
     ansibile.builtin.user:
      name: roboshop
      state: present
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

   - name: create a directory app
     ansible.builtin.file:
       path: /app
       state: directory

   - name: donloading application code 
     ansibile.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

   - name: unzip the application code
     ansiblie.builtin.unarchive:
       src: /tmp/catalogue.zip
       dest: /app