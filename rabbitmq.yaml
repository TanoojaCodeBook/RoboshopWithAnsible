- name : configuring rabbitmq
  hosts: rabbitmq
  become: yes
  tasks:
   - name: copying rabbitmq repo file
     ansible.builtin.copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo
   - name: install rabbitmq
     ansible.builtin.dnf:
       name: rabbitmq-server
       state: present

   - name: start and enable the rabbitmq-server
     ansible.builtin.service:
      name: rabbitmq-server
      state: started
      enabled: yes 
   - name: wait for rabbitmq to start
     ansible.builtin.pause:
      seconds: 10
   - name: creating user and assigning permission
     community.rabbitmq.rabbitmq_user:
        user: roboshop
        password: roboshop123   #creating the user roboshop
        vhost: /
        configure_priv: ".*"
        read_priv: ".*"
        write_priv: ".*"
        state: present
      