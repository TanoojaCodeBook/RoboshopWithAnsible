- name: configuring the redis
  hosts: redis
  become: yes
  tasks:
  - name: enablleing redis 7 version
    ansible.builtin.command: dnf module enable redis:7 -
  - name: installing redis 7
    ansible.builtin.command: dnf install redis -y
  - name: updating listen address
    ansible.builtin.replace: 
       path: etc/redis/redis.conf
       regexp: "127.0.0.1"
       replace: "0.0.0.0"
       backup: yes
  - name: update protected mode from yes to no
    ansible.builtin.lineinfile: 
       path: /etc/redis/redis.conf
       regexp: "protected-mode"
       line : "protected-mode no"
  - name: start and enable redis
    ansible.builtin.service:
        name: redis
        state: started
        enabled: yes
      
     