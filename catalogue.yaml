- name: configuring catalogue
  hosts: catalogue
  become: yes
  tasks:
   - name: enable node js 20
     ansible.builtin.command: dnf module enable nodejs:20 -y

   - name: installing node js 20 
     ansible.builtin.dnf:
       name: nodejs
       state: present
    
   - name: creating system user roboshop
     ansible.builtin.user:
      name: roboshop
      state: present
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

   - name: create a directory app
     ansible.builtin.file:
       path: /app
       state: directory

   - name: donloading application code 
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

   - name: unzip the application code
     ansible.builtin.unarchive:
       src: /tmp/catalogue.zip
       dest: /app
       remote_src: yes

   - name: install npm dependencies
     community.general.npm:
       path: /app

   - name: copying catalog.service
     ansible.builtin.copy:
      src: catalog.service
      dest: /etc/systemd/system/catalogue.service
      remote_src: yes

   - name: copying mongodb repo
     ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

   - name: install mongodb client
     ansible.builtin.dnf:
       name: mongodb-mongosh
       state: present

   - name: check schema is loaded or not . #if already loaded no need to load again other will load the schema. if we don't check this  when script multiple times it will load the schema multiples times. it causes memory issue.
     ansible.builtin.command: mongosh --host "{{MONGODB_HOST}}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
     register: catalogue_output

   - name: print the catalogue_schema_output
     ansible.builtin.debug:
       msg: "{{catalogue_output}}"
        
