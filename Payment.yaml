- name: configuring payment  service 
  hosts: payment
  become: yes
  tasks: 
    - name: installing python
      ansible.builtin.dnf:
       name: "{{item}}"
       state: present
      loop:
       - python3 
       - gcc 
       - python3-devel

    - name: creating system user roboshop
      ansible.builtin.user:
       name : roboshop
       state: present
       system: true
       home: /app
       shell: /sbin/nologin
       comment: "roboshop system user"
    
    - name: delete app directory   #if the directory is there it will delete otherwise keep quiet.
      ansible.builtin.file:
       path: /app
       state: absent

    - name: create a directory app
      ansible.builtin.file:
       path: /app
       state: directory

    - name: delete application code zip file  if anything exists
      ansible.builtin.file:
       path: /tmp/payment.zip
       state: absent
     
    - name: downloading application code 
      ansible.builtin.get_url:
       url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
       dest: /tmp/payment.zip

    - name: unzip the application code
      ansible.builtin.unarchive:
       src: /tmp/payment.zip
       dest: /app
       remote_src: yes
     
    - name: install dependencie
      ansible.builtin.pip:
       requirements: requirements.txt
       executable: pip3.9
      args:
       chdir: /app
  
    - name: copy payment service
      ansible.builtin.template:
       src: payment.service
       dest: /etc/systemd/system/payment.service

    - name: daemon reload
      ansible.builtin.systemd_service:
       daemon_reload: true

    - name: start enable payment
      ansible.builtin.service:
       name: payment
       state: restarted
      enabled: yes

       